name: Deploy Lab 12 Applications

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (for better Docker builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Build and push Personal Website image
      - name: Build and push Personal Website image
        uses: docker/build-push-action@v5
        with:
          context: ./personal-website
          push: true
          tags: ghcr.io/${{ github.repository }}/personal-website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 5: Build and push Todo App image
      - name: Build and push Todo App image
        uses: docker/build-push-action@v5
        with:
          context: ./todo-app
          push: true
          tags: ghcr.io/${{ github.repository }}/todo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6: Verify images were built successfully
      - name: Verify Docker images
        run: |
          echo "=== Personal Website Image ==="
          docker build --tag personal-website-test ./personal-website
          echo "Personal Website image built successfully!"

          echo "=== Todo App Image ==="
          docker build --tag todo-app-test ./todo-app
          echo "Todo App image built successfully!"

      # Step 7: Test containers locally using Docker Compose
      - name: Run Docker Compose
        run: |
          docker compose up -d
          sleep 5

      # Step 8: Verify services are running
      - name: Verify services are running
        run: |
          echo "Checking Personal Website (port 80)..."
          curl -s -o /dev/null -w "Personal Website HTTP Status: %{http_code}\n" http://localhost:80

          echo "Checking Todo App (port 3001)..."
          curl -s -o /dev/null -w "Todo App HTTP Status: %{http_code}\n" http://localhost:3001

          echo "Checking Todo API..."
          curl -s http://localhost:3001/api/todos | head -c 200
          echo ""

      # Step 9: Stop containers after verification
      - name: Stop Docker Compose
        if: always()
        run: docker compose down
